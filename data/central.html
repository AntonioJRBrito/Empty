<!DOCTYPE html>
<html>
  <head>
    <title>IA Solucoes</title>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/igra.css?v=3">
  </head>
  <body>
    <script src="/js/icons.js"></script>
    <script src="/js/messages.js"></script>
    <script>
      window.onload=function(){
        // permissão de acesso
        if(sessionStorage.getItem("autenticado")!=="sim"){window.location.href="index.html";return;}
        // variáveis
        const socket=new WebSocket(`ws://${location.host}/ws`);
        const painel=document.getElementById("divIndex");
        // comportamentos
        socket.addEventListener('open',function(event){socket.send("LDD");});
        // funções
        function updateDimmerUI(btn){
          const slider=btn.querySelector(`.dimmer-range`);
          const pctEl=btn.querySelector(`.tempo`);
          const v=Math.max(0,Math.min(100,parseInt(slider.value,10)||0));
          slider.style.setProperty('--dimmer-pct',v+'%');
          if(pctEl)pctEl.textContent=v+'%';
        }
        function genDisp(dispositivo){
          const{id,nome,tipo,status,tempo}=dispositivo;
          const botao=document.createElement('button');
          botao.id=id;
          botao.className=(tipo===4)?'btn-painel dimmer':'btn-painel';
          botao.dataset.id=String(id);
          botao.dataset.tipo=String(tipo);
          botao.dataset.status=String(status);
          let icone="";
          switch(tipo){
            case 1: icone=icons.power.replace('stroke="currentColor"',status=='1'?'stroke="limegreen"':'stroke="Crimson"');break;
            case 2: icone=icons.pulse.replace('stroke="currentColor"','stroke="goldenrod"');break;
            case 3: icone=icons.watch.replace('stroke="currentColor"','stroke="goldenrod"');break;
            case 4: icone=icons.sun.replace('stroke="currentColor"',status=='1'?'stroke="limegreen"':'stroke="Crimson"');break;
          }
          if(tipo===4){
            botao.innerHTML=`
              <div class="dimmer-body">
                <div class="area-esquerda"><span class="icone">${icone}</span><span class="tempo" id="pct-${id}">${Number(tempo)||0}%</span></div>
                <div class="area-direita">
                  <div class="area-nome">${nome}</div>
                  <div class="slider-row"><input type="range" class="dimmer-range" id="range-${id}" min="0" max="100" step="1" value="${Number(tempo)||0}"></div>
                </div>
              </div>`;
            const slider=botao.querySelector('.dimmer-range');
            slider.addEventListener('input',()=>updateDimmerUI(botao));
            slider.addEventListener('change',()=>btnDimm(botao));
            const btn=botao.querySelector('.area-esquerda');
            btn.addEventListener('click',(e)=>{e.preventDefault();e.stopPropagation();btnAct(botao);});
            updateDimmerUI(botao);
          }else{
            botao.innerHTML=`
              <div class="area-esquerda"><span class="icone">${icone}</span>${tipo===3?`<span class="tempo">${tempo}s</span>`:""}</div>
              <div class="area-nome">${nome}</div>`;
            botao.addEventListener('click',()=>btnAct(botao));
          }
          return botao;
        }
        function genSens(sensor){
          const{id,nome,tipo,status,tempo}=sensor;
          const position=String(status);
          const el=document.createElement("div");
          el.id=id;
          el.className="sen-painel";
          const areaEsquerda=document.createElement("div");
          areaEsquerda.className="area-esquerda";
          const iconeDiv=document.createElement("div");
          iconeDiv.className="icone";
          const tempoDiv=document.createElement("div");
          tempoDiv.className="tempo";
          if(tipo===9){
            if(typeof icons!=="undefined"&&icons.vumeter){iconeDiv.innerHTML=icons.vumeter;}else{iconeDiv.textContent="valor";}
            tempoDiv.textContent=tempo!==undefined&&tempo!==null?String(tempo):"";
          }else{
            if(position==='1'){
              if(typeof icons!=="undefined"&&icons.zap){iconeDiv.innerHTML=icons.zap;}else{iconeDiv.textContent="ON";}
              tempoDiv.textContent="ativado";
            }else{
              if(typeof icons!=="undefined"&&icons.zapoff){iconeDiv.innerHTML=icons.zapoff;}else{iconeDiv.textContent="OFF";}
              tempoDiv.textContent="desativado";
            }
          }
          if(position==='1'){iconeDiv.style.color="#00ff00";}else{iconeDiv.style.color="#ff3333";}
          areaEsquerda.appendChild(iconeDiv);
          areaEsquerda.appendChild(tempoDiv);
          const areaNome=document.createElement("div");
          areaNome.className="area-nome";
          areaNome.textContent=nome;
          el.appendChild(areaEsquerda);
          el.appendChild(areaNome);
          return el;
        }
        function btnAct(btn){
          const id=btn.dataset.id;
          const status=btn.dataset.status;
          const tipo=btn.dataset.tipo;
          const msg=`${(id=='1'||id=='2'||id=='3')?'INT':'CMD'}:${id}:${status}:${tipo}`;
          socket.send(msg);
          const ic=btn.querySelector('.icone');
          ic.innerHTML=icons.refresh_cw;
          ic.classList.add('is-sending');
        }
        function btnDimm(btn){
          const id=btn.dataset.id;
          const tipo=btn.dataset.tipo;
          const slider=btn.querySelector('.dimmer-range');
          const tempo=Math.max(0,Math.min(100,parseInt(slider.value,10)||0));
          socket.send(`BRG:${id}:${tempo}:${tipo}`);
          const ic=btn.querySelector('.icone');
          ic.innerHTML=icons.refresh_cw;
          ic.classList.add('is-sending');
        }
        socket.onmessage=function(event){
          try{
            if(event.data.startsWith("keep")){
              socket.send("alive");
              return;
            }
            if(event.data.startsWith("ctnew")){
              const json=JSON.parse(event.data.substring(5));
              painel.innerHTML="";
              for(let i=0;i<json.length;i++){
                const disp=json[i];
                const botao=genDisp({id:disp["id"],nome:disp["name"],tipo:disp["type"],status:disp["status"],tempo:disp["time"]||0});
                painel.appendChild(botao);
              }
              const btnSair=document.createElement("button");
              btnSair.id="botaoSair";
              btnSair.className="btn-painel";
              btnSair.innerHTML=`<div class="area-esquerda"><span class="icone">${icons["exit"]}</span></div><div class="area-nome">Sair</div>`;
              btnSair.onclick=()=>window.location.href="/";
              painel.appendChild(btnSair);
              return;
            }
            if(event.data.startsWith("stnew")){
              const json=JSON.parse(event.data.substring(5));
              const sepDiv=document.createElement("div");
              sepDiv.innerHTML='<div class="custom-separator">Sensores</div>';
              painel.appendChild(sepDiv);
              for(let i=0;i<json.length;i++){
                const sens=json[i];
                const sensor=genSens({id:sens["id"],nome:sens["name"],tipo:sens["type"],status:sens["status"],tempo:sens["time"]||0});
                painel.appendChild(sensor);
              }
              return;
            }
            if(event.data.startsWith("ctup")){
              const json=JSON.parse(event.data.substring(4));
              const disp=json[0];
              const newBtn=genDisp({id:disp["id"],nome:disp["name"],tipo:disp["type"],status:disp["status"],tempo:disp["time"]||0});
              const existBtn=document.getElementById(disp["id"]);
              if(existBtn){painel.replaceChild(newBtn,existBtn);}else{painel.appendChild(newBtn);}
              return;
            }
            if(event.data.startsWith("stup")){
              const json=JSON.parse(event.data.substring(4));
              const sens=json[0];
              const newSens=genSens({id:sens["id"],nome:sens["name"],tipo:sens["type"],status:sens["status"],tempo:sens["time"]||0});
              const existSens=document.getElementById(sens["id"]);
              if(existSens){painel.replaceChild(newSens,existSens);}else{painel.appendChild(newSens);}
              return;
            }
            console.error("Mensagem desconhecida:",event.data);
          }catch(e){console.error("Erro ao processar mensagem WS:",e);}
        };
        // inicialização
        painel.style.display="flex";
      };
    </script>
    <div id="divTopo" class="topo"><h2>Sistema de Automação</h2></div>
    <div id="divIndex" class="util"></div>
    <div class="rodape" id="divRodape"><img src="/img/logomarca.png" width="40px" height="40px"></div>
  </body>
</html>
